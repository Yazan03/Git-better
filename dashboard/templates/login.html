<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Scanner</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      font-size: 16px;
      font-weight: 600;
    }
    .login-logo .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
    .login-card h1 { font-size: 18px; margin-bottom: 24px; }
    .login-error {
      background: var(--high-bg);
      border: 1px solid var(--high-border);
      color: var(--high-fg);
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
    }
    .login-field { margin-bottom: 14px; }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 5px;
    }
    .login-field input { width: 100%; font-size: 14px; }
    .login-submit { width: 100%; margin-top: 8px; justify-content: center; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="dot"></span>
      <span>Scanner</span>
    </div>
    <h1>Sign in</h1>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login_page') }}">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="login-field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               autocomplete="username" autofocus required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary login-submit">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
