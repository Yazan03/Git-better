name: Secure CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r requirements-dev.txt

      - name: Scanner Unit Tests
        run: pytest tests/ -v

      - name: Bandit Scan
        run: |
          bandit -r . -f json -o bandit-report.json || true

      - name: Safety Scan
        run: |
          if [ -s requirements.txt ]; then
            safety check -r requirements.txt --json > safety-report.json || true
          elif [ -s requirements-dev.txt ]; then
            safety check -r requirements-dev.txt --json > safety-report.json || true
          else
            safety check --json > safety-report.json || true
          fi

      - name: Custom Scanner
        run: |
          python scripts/vuln_scanner.py --path . --output custom-report.json || true

      - name: Evaluate Results
        run: |
          python scripts/evaluate_results.py \
            --bandit bandit-report.json \
            --safety safety-report.json \
            --custom custom-report.json

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            custom-report.json
