<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Scanner Dashboard{% endblock %}</title>
  <script>
    // Apply persisted theme before paint to avoid flash of wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="dot"></span>
      <span>Scanner</span>
    </a>
    <nav>
      <a href="{{ url_for('index') }}"
         class="{{ 'active' if request.endpoint == 'index' else '' }}">Upload</a>
      <a href="{{ url_for('reports') }}"
         class="{{ 'active' if request.endpoint == 'reports' else '' }}">Reports</a>
    </nav>
    <span class="spacer"></span>
    {% block topbar_right %}{% endblock %}
    {% if current_user %}
    <span class="topbar-user">{{ current_user.username }}</span>
    <form method="POST" action="{{ url_for('logout') }}" style="display:inline">
      <button type="submit" class="btn btn-sm">Sign out</button>
    </form>
    {% endif %}
    <button class="theme-toggle" type="button" id="themeToggle"
            aria-label="Toggle color theme" title="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% for m in messages %}
        <div class="flash">{{ m }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script>
    (function () {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var root = document.documentElement;
        var current = root.getAttribute('data-theme');
        // If unset, fall back to OS preference to decide what to flip to.
        if (!current) {
          current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
