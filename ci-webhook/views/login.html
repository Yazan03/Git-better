<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — CI Dashboard</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --accent:  #388bfd;
      --failure: #f85149;
      --radius:  8px;
      --font:    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    [data-theme="light"] {
      --bg:      #f6f8fa;
      --surface: #ffffff;
      --border:  #d0d7de;
      --text:    #1f2328;
      --muted:   #57606a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 360px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--accent); }
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 9px;
      cursor: pointer;
      margin-top: 4px;
    }
    button[type="submit"]:hover { opacity: .88; }
    .error {
      background: color-mix(in srgb, var(--failure) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--failure) 40%, transparent);
      color: var(--failure);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CI Build Dashboard</div>
    <div class="sub">Sign in to your account</div>
    <!--ERROR-->
    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required autofocus autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <button type="submit">Sign in</button>
    </form>
  </div>
  <script>
    const t = localStorage.getItem('ci-dash-theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
